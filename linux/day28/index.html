<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Docker Image</title>
    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: linear-gradient(135deg, #0f2027, #2c5364);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .card {
            background: rgba(0, 0, 0, 0.5);
            padding: 50px;
            border-radius: 16px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
            max-width: 500px;
        }

        h1 {
            font-size: 2.8em;
            margin-bottom: 15px;
        }

        p {
            font-size: 1.2em;
            opacity: 0.85;
        }

        .tag {
            margin-top: 20px;
            display: inline-block;
            padding: 10px 20px;
            border-radius: 8px;
            background: #00c6ff;
            color: #000;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🚀 My New Docker Image</h1>
        <p>This page is served by Nginx inside a Docker container.</p>
        <p>Volume is connected successfully.</p>
        <div class="tag">DevOps Practice</div>
    </div>
</body>
</html>
